query SamplesPage($limit: Int!, $offset: Int) {
  allSample(sort: [{ _createdAt: DESC }], limit: $limit, offset: $offset) {
    _id
    title
    slug {
      current
    }
    highResFile {
      mp3Url
    }
    categories {
      title
      slug {
        current
      }
    }
  }
}

